<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SENDIT – Peer-to-Peer Courier Delivery</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --card: #1a1a1a;
      --accent: #f5c518;
      --accent2: #ff5733;
      --text: #f0ede6;
      --muted: #888;
      --border: #2a2a2a;
      --radius: 16px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 60px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 4px;
      color: var(--accent);
    }

    .nav-logo span { color: var(--accent2); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-cta {
      background: var(--accent);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }

    .nav-cta:hover { background: #ffd93d; transform: translateY(-1px); }

    /* ─── HERO ─── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 60px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 50%, rgba(245,197,24,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,87,51,0.06) 0%, transparent 60%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
    }

    .hero-content { position: relative; max-width: 700px; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
